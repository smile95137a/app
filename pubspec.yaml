name: mockkings
description: MockKings - Sports Bet Results Simulator App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.4.2
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  flutter_svg: ^2.3.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/dk_crown.png
    - assets/images/dk_logo.png
    - assets/images/dk_app_icon.png
    - assets/images/app_ref/
    - assets/images/reference/
    - assets/images/profile_placeholder.png
    - assets/images/gold_border_bet_card.webp
    - assets/images/mybets_winner_noise.jpg
    - assets/images/mybets_winner_header.svg
    - assets/icons/
    - assets/data/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter_regular.ttf
          weight: 400
        - asset: assets/fonts/inter_medium.ttf
          weight: 500
        - asset: assets/fonts/inter_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/inter_bold.ttf
          weight: 700
        - asset: assets/fonts/inter_extra_bold.ttf
          weight: 800
